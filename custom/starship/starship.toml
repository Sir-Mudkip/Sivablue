format = """\
\\[$username[@](bold fg:111)$hostname\\]-\\[$directory\\] $git_branch$git_status$python$java$nodejs$rust$golang$ruby$php$dotnet$lua$perl$kotlin$swift$zig$elixir$erlang$haskell$julia$nim$ocaml$scala$dart$deno$bun$cmake$meson$aws$azure
$character"""

[username]
show_always = true
format = "[$user](bold fg:111)"
style_root = 'bold red'

[hostname]
ssh_only = false
format = "[$hostname](bold fg:111)"

[directory]
style = "bold fg:34"
format = "[$path]($style)[$read_only]($read_only_style)"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

# Language modules - Nerd Font logos only
[python]
symbol = "\ue73c "
format = "[${symbol}${virtualenv}](yellow)"

[java]
symbol = "\ue738 "

[nodejs]
symbol = "\ue719 "

[rust]
symbol = "\ue7a8 "

[golang]
symbol = "\ue724 "

[ruby]
symbol = "\ue739 "

[php]
symbol = "\ue73d "

[dotnet]
symbol = "\ue7b2 "

[lua]
symbol = "\ue826 "

[perl]
symbol = "\ue769 "

[kotlin]
symbol = "\ue81b "

[swift]
symbol = "\ue755 "

[zig]
symbol = "\ue8ef "

[elixir]
symbol = "\ue7cd "

[erlang]
symbol = "\ue7b1 "

[haskell]
symbol = "\ue777 "

[julia]
symbol = "\ue80d "

[nim]
