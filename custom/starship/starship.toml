[cmake]
symbol = "△ "

[meson]
symbol = "⬡ "

# AWS
[aws]
format = 'on [$symbol$profile $region]($style) '
style = 'bold yellow'
symbol = '☁️'
[aws.profile_aliases]
Enterprise_Naming_Scheme-voidstars = 'void**'

# Azure:
[azure]
disabled = false
format = 'on [$symbol($subscription)]($style) '
symbol = '󰠅 '
style = 'bold fg:81'
