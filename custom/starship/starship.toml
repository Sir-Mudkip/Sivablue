format = """\
\\[$username@$hostname\\] $directory$git_branch$git_status$python$java$nodejs$rust$golang$ruby$php$dotnet$lua$perl$kotlin$swift$zig$elixir$erlang$haskell$julia$nim$ocaml$scala$dart$deno$bun$cmake$meson
$character"""

[username]
show_always = true
format = "[$user](bold green)"

[hostname]
ssh_only = false
format = "[$hostname](bold green)"

[directory]
style = "bold #5f87ff"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

# Language modules - Nerd Font logos only
[python]
symbol = "\ue73c "
format = "[${symbol}${virtualenv}](yellow)"

